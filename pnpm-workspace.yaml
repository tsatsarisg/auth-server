# Monorepo layout: the top-level "auth-server" repo contains a workspace package
# also named "auth-server". All NestJS application source code lives in
# auth-server/auth-server/src/. The nesting is intentional (workspace root vs
# workspace package) and should NOT be restructured.
packages:
  - auth-server

onlyBuiltDependencies:
  - '@nestjs/core'
  - unrs-resolver

overrides:
  ajv@<6.14.0: '>=6.14.0'
  ajv@>=7.0.0-alpha.0 <8.18.0: '>=8.18.0'
  brace-expansion@<1.1.13: '>=1.1.13'
  brace-expansion@>=2.0.0 <2.0.3: '>=2.0.3'
  diff@>=4.0.0 <4.0.4: '>=4.0.4'
  esbuild@<=0.24.2: '>=0.25.0'
  flatted@<3.4.0: '>=3.4.0'
  flatted@<=3.4.1: '>=3.4.2'
  js-yaml@<3.14.2: '>=3.14.2'
  lodash@<=4.17.23: '>=4.18.0'
  lodash@>=4.0.0 <=4.17.23: '>=4.18.0'
  minimatch@<3.1.3: '>=3.1.3'
  minimatch@<3.1.4: '>=3.1.4'
  minimatch@>=9.0.0 <9.0.6: '>=9.0.6'
  minimatch@>=9.0.0 <9.0.7: '>=9.0.7'
  path-to-regexp@>=8.0.0 <8.4.0: '>=8.4.0'
  picomatch@<2.3.2: '>=2.3.2'
  picomatch@>=4.0.0 <4.0.4: '>=4.0.4'
  qs@<6.14.1: '>=6.14.1'
  qs@>=6.7.0 <=6.14.1: '>=6.14.2'
